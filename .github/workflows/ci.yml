name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          if [ -z "$CHANGED" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
          elif echo "$CHANGED" | grep -qvE '^(db/|docs/|scripts/|\.playwright-mcp/|playwright-report/|test-results/|\.imgbotconfig|\.markdownlint|\.repomixignore|repomix|\.DS_Store|LICENSE|CNAME)|\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^(src/|shared/|public/|astro\.config\.mjs)'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  lint-typecheck:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_lint-typecheck.yml
    permissions:
      contents: read

  unit-integration:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_unit-integration.yml
    permissions:
      contents: read

  smoke:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_smoke.yml
    permissions:
      contents: read

  e2e:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_e2e.yml
    permissions:
      contents: read

  lighthouse:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/_lighthouse.yml
    permissions:
      contents: write
      issues: write
    with:
      url: http://localhost:3000
      local-server: true
