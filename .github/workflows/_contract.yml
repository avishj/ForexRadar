name: Contract Tests

on:
  workflow_call:

jobs:
  contract:
    name: Contract Tests (Visa + ECB)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup JS environment
        uses: ./.github/actions/setup-js
        with:
          playwright: "true"

      - name: Contract tests (Visa + ECB)
        run: bun run test:contract:action

      - name: Upload contract report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: ${{ !cancelled() }}
        with:
          name: contract-test-report
          path: playwright-report/
          retention-days: 90
